[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]

confidence-threshold = 0.8

private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
ignore = [
    "RUSTSEC-2024-0388", # derivative (transitive via soroban-sdk)
    "RUSTSEC-2024-0436", # paste (transitive via soroban-sdk)
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
